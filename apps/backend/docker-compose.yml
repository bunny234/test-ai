version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgrestrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme} # Strongly recommend changing this
      POSTGRES_DB: ${POSTGRES_DB:-TradeDb}
    ports:
      - "${DB_PORT:-5433}:5432" # Correct container port is 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgrestrade} -d ${POSTGRES_DB:-TradeDb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
