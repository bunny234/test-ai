name: CI

on:
  push:
    branches: [ main ]

jobs:
  build_and_test_backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and test backend
      run: |
        docker build -t backend-test -f apps/backend/Dockerfile .
        docker run backend-test npm run test
  build_and_test_frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and test frontend
      run: |
        docker build -t frontend-test -f apps/frontend/Dockerfile .
        # The frontend doesn't have any tests, so we just check if it builds
        docker run frontend-test ls /usr/share/nginx/html
